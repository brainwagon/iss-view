<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISS View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    canvas { display: block; }
    #hud {
      position: fixed; top: 16px; left: 16px;
      color: #0f0; font-size: 13px;
      background: rgba(0, 0, 0, 0.7); padding: 12px 16px; border-radius: 4px;
      border: 1px solid #0f0;
      pointer-events: none; line-height: 1.8;
      font-variant-numeric: tabular-nums;
    }
    #cam-switcher {
      position: fixed; bottom: 16px; left: 16px;
      display: flex; gap: 8px;
    }
    #cam-switcher button {
      padding: 6px 12px; background: #1a1a1a; color: #0f0;
      border: 1px solid #0f0; border-radius: 3px; cursor: pointer;
      font-family: monospace; font-size: 11px;
      transition: all 0.2s;
    }
    #cam-switcher button:hover { background: #0f0; color: #000; }
    #cam-switcher button.active { background: #0f0; color: #000; font-weight: bold; }
    #viz-controls {
      position: fixed; bottom: 16px; right: 16px;
      background: rgba(0, 0, 0, 0.7); padding: 10px 14px; border-radius: 4px;
      border: 1px solid #0f0; color: #0f0; font-size: 12px;
      display: flex; flex-direction: column; gap: 6px;
    }
    #viz-controls label { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
    #viz-controls input[type="checkbox"] { accent-color: #0f0; width: 13px; height: 13px; cursor: pointer; }
    #map-panel {
      position: fixed; bottom: 110px; right: 16px;
      width: 360px; height: 180px;
      border: 1px solid rgba(0, 255, 0, 0.5); border-radius: 4px;
      overflow: hidden; background: #000;
    }
    #map-canvas { display: block; width: 100%; height: 100%; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/",
      "satellite": "https://cdn.jsdelivr.net/npm/satellite.js@4.1.3/dist/satellite.es.js"
    }
  }
  </script>
</head>
<body>
  <div id="hud">
    <div>LAT: <span id="hud-lat">--</span>°</div>
    <div>LON: <span id="hud-lon">--</span>°</div>
    <div>ALT: <span id="hud-alt">--</span> km</div>
    <div>VEL: <span id="hud-vel">--</span> km/s</div>
    <div>SRC: <span id="hud-src">--</span></div>
    <div style="margin-top:6px;padding-top:6px;border-top:1px solid #0f0;">
      CAM: <span id="hud-mode">NADIR</span>
    </div>
    <div>FPS: <span id="hud-fps">--</span></div>
    <div style="margin-top:8px;font-size:11px;color:#888;">
      [N]adir [F]orward [O]rbit [C]Free [E]xterior [M]ap
    </div>
  </div>
  <div id="map-panel">
    <canvas id="map-canvas" width="360" height="180"></canvas>
  </div>
  <div id="viz-controls">
    <label><input type="checkbox" id="chk-dayonly" checked> Day only (no night side)</label>
    <label><input type="checkbox" id="chk-clouds"> Show clouds</label>
    <label><input type="checkbox" id="chk-map" checked> Show map</label>
  </div>
  <div id="cam-switcher">
    <button data-cam="nadir">NADIR</button>
    <button data-cam="forward">FORWARD</button>
    <button data-cam="orbit">ORBIT</button>
    <button data-cam="free">FREE</button>
    <button data-cam="exterior">EXTERIOR</button>
  </div>
  <script type="module" src="src/app.js"></script>
</body>
</html>
