<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISS View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    canvas { display: block; }
    #webgl-canvas { position: fixed; top: 0; left: 0; z-index: 0; }
    #hud {
      position: fixed; top: 16px; left: 16px;
      color: #0f0; font-size: 13px;
      background: rgba(0, 0, 0, 0.7); padding: 12px 16px; border-radius: 4px;
      border: 1px solid #0f0;
      pointer-events: none; line-height: 1.8;
      font-variant-numeric: tabular-nums;
      z-index: 10;
    }
    #cam-switcher {
      position: fixed; bottom: 16px; left: 16px;
      display: flex; gap: 8px;
      z-index: 10;
    }
    #cam-switcher button {
      padding: 6px 12px; background: #1a1a1a; color: #0f0;
      border: 1px solid #0f0; border-radius: 3px; cursor: pointer;
      font-family: monospace; font-size: 11px;
      transition: all 0.2s;
    }
    #cam-switcher button:hover { background: #0f0; color: #000; }
    #cam-switcher button.active { background: #0f0; color: #000; font-weight: bold; }
    #right-stack {
      position: fixed; bottom: 16px; right: 16px;
      display: flex; flex-direction: column; gap: 10px;
      align-items: flex-end;
      z-index: 10;
    }
    #viz-controls {
      background: rgba(0, 0, 0, 0.7); padding: 10px 14px; border-radius: 4px;
      border: 1px solid #0f0; color: #0f0; font-size: 12px;
      display: flex; flex-direction: column; gap: 6px;
    }
    #viz-controls label { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
    #viz-controls input[type="checkbox"] { accent-color: #0f0; width: 13px; height: 13px; cursor: pointer; }
    #viz-controls hr { border: none; border-top: 1px solid rgba(0,255,0,0.35); margin: 4px 0; }
    #viz-controls .slider-row {
      display: grid; grid-template-columns: 64px 1fr 36px;
      align-items: center; gap: 8px; font-size: 11px;
    }
    #viz-controls .slider-row input[type="range"] {
      accent-color: #0f0; width: 100%;
    }
    #viz-controls .slider-row .val { text-align: right; color: #7f7; }
    #map-panel {
      width: 360px; height: 180px;
      border: 1px solid rgba(0, 255, 0, 0.5); border-radius: 4px;
      overflow: hidden; background: #000;
    }
    #map-canvas { display: block; width: 100%; height: 100%; }
    #top-right-btns {
      position: fixed; top: 16px; right: 16px;
      display: flex; gap: 6px;
      z-index: 10;
    }
    #top-right-btns button {
      padding: 6px 12px; background: #1a1a1a; color: #0f0;
      border: 1px solid #0f0; border-radius: 3px; cursor: pointer;
      font-family: monospace; font-size: 11px;
      transition: all 0.2s;
    }
    #top-right-btns button:hover { background: #0f0; color: #000; }
    #viz-controls details { border: none; }
    #viz-controls details > summary {
      cursor: pointer; user-select: none; font-size: 11px;
      list-style: none; padding: 2px 0; color: #0f0;
    }
    #viz-controls details > summary::-webkit-details-marker { display: none; }
    #viz-controls details > summary::before {
      content: '▸ '; display: inline-block; transition: transform 0.15s;
    }
    #viz-controls details[open] > summary::before { transform: rotate(90deg); }
    body.ui-hidden #hud,
    body.ui-hidden #cam-switcher,
    body.ui-hidden #right-stack,
    body.ui-hidden #map-panel,
    body.ui-hidden #viz-controls,
    body.ui-hidden #btn-fullscreen { display: none; }
    @media (max-width: 640px), (max-height: 500px) {
      #hud {
        top: 8px; left: 8px; font-size: 11px; line-height: 1.4;
        padding: 6px 10px;
      }
      #hud .kbd-hint { display: none; }
      #top-right-btns { top: 8px; right: 8px; gap: 4px; }
      #top-right-btns button { padding: 4px 8px; font-size: 10px; }
      #cam-switcher {
        bottom: 8px; left: 8px;
        flex-wrap: wrap;
        max-width: calc(100vw - 200px);
      }
      #cam-switcher button { padding: 4px 8px; font-size: 10px; }
      /* Drop the flex wrapper; position map/controls directly as fixed */
      #right-stack { display: contents; }
      #map-panel {
        position: fixed; bottom: 8px; right: 8px;
        width: 160px; height: 80px;
        z-index: 10;
      }
      #viz-controls {
        position: fixed; bottom: 96px; right: 8px;
        width: 160px;
        padding: 6px 8px; font-size: 11px; gap: 4px;
        z-index: 10;
      }
      #viz-controls .slider-row {
        grid-template-columns: 56px 1fr 30px; gap: 6px; font-size: 10px;
      }
    }
    /* Landscape phones: vertical space is tight, compact further */
    @media (max-height: 500px) and (orientation: landscape) {
      #hud { font-size: 10px; padding: 4px 8px; line-height: 1.3; }
      #map-panel { width: 140px; height: 70px; }
      #viz-controls { bottom: 86px; width: 140px; }
      #cam-switcher { max-width: none; }
    }
    #loader-overlay {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #0f0; font-family: monospace;
      z-index: 1000;
      transition: opacity 0.3s;
    }
    #loader-overlay.hidden { opacity: 0; pointer-events: none; }
    #loader-label { font-size: 14px; margin-bottom: 14px; }
    #loader-bar-outer {
      width: 320px; height: 10px;
      border: 1px solid #0f0; border-radius: 2px;
      overflow: hidden; background: #000;
    }
    #loader-bar-inner {
      height: 100%; width: 0%;
      background: #0f0;
      transition: width 0.15s linear;
    }
    #loader-bar-outer.indeterminate #loader-bar-inner {
      width: 30%;
      animation: loader-slide 1.2s ease-in-out infinite;
    }
    @keyframes loader-slide {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(440%); }
    }
    #loader-detail { margin-top: 10px; font-size: 11px; color: #7f7; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/",
      "satellite": "https://cdn.jsdelivr.net/npm/satellite.js@4.1.3/dist/satellite.es.js"
    }
  }
  </script>
</head>
<body>
  <div id="loader-overlay">
    <div id="loader-label">Loading ISS model...</div>
    <div id="loader-bar-outer"><div id="loader-bar-inner"></div></div>
    <div id="loader-detail">&nbsp;</div>
  </div>
  <div id="hud">
    <div>LAT: <span id="hud-lat">--</span>°</div>
    <div>LON: <span id="hud-lon">--</span>°</div>
    <div>ALT: <span id="hud-alt">--</span> km</div>
    <div>VEL: <span id="hud-vel">--</span> km/s</div>
    <div>SRC: <span id="hud-src">--</span></div>
    <div>SUN: <span id="hud-sun">--</span>%</div>
    <div style="margin-top:6px;padding-top:6px;border-top:1px solid #0f0;">
      CAM: <span id="hud-mode">NADIR</span>
    </div>
    <div>FPS: <span id="hud-fps">--</span></div>
    <div class="kbd-hint" style="margin-top:8px;font-size:11px;color:#888;">
      [N]adir [F]orward [O]rbit [C]Free [E]xterior [M]ap [H]ide UI [\]Fullscreen
    </div>
  </div>
  <div id="right-stack">
  <div id="map-panel">
    <canvas id="map-canvas" width="360" height="180"></canvas>
  </div>
  <div id="viz-controls">
    <label><input type="checkbox" id="chk-dayonly"> Day only (no night side)</label>
    <label><input type="checkbox" id="chk-clouds" checked> Show clouds</label>
    <label><input type="checkbox" id="chk-map" checked> Show map</label>
    <label><input type="checkbox" id="chk-shadows" checked> ISS self-shadows</label>
    <details id="tone-details" open>
      <summary>Tone</summary>
      <div class="slider-row">
        <span>Day bright</span>
        <input type="range" id="sld-day-b" min="0.1" max="3" step="0.05" value="1.0">
        <span class="val" id="val-day-b">1.00</span>
      </div>
      <div class="slider-row">
        <span>Day gamma</span>
        <input type="range" id="sld-day-g" min="0.4" max="2.5" step="0.05" value="1.0">
        <span class="val" id="val-day-g">1.00</span>
      </div>
      <div class="slider-row">
        <span>Night bright</span>
        <input type="range" id="sld-night-b" min="0.1" max="5" step="0.05" value="2.2">
        <span class="val" id="val-night-b">2.20</span>
      </div>
      <div class="slider-row">
        <span>Night gamma</span>
        <input type="range" id="sld-night-g" min="0.4" max="2.5" step="0.05" value="0.8">
        <span class="val" id="val-night-g">0.80</span>
      </div>
    </details>
  </div>
  </div>
  <div id="cam-switcher">
    <button data-cam="orbit">ORBIT</button>
    <button data-cam="exterior">EXTERIOR</button>
    <button data-cam="forward">FORWARD</button>
    <button data-cam="nadir">NADIR</button>
    <button data-cam="free">FREE</button>
  </div>
  <div id="top-right-btns">
    <button id="btn-ui-toggle" title="Hide UI (H)">HIDE UI</button>
    <button id="btn-fullscreen" title="Toggle fullscreen (\)">FULLSCREEN</button>
  </div>
  <script type="module" src="src/app.js"></script>
</body>
</html>
